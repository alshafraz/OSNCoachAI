version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: math-osn-coach-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://osn_admin:osn_secure_pass@db:5432/mathosn_db?schema=public
      - REDIS_URL=redis://cache:6379
      - OPENAI_API_KEY=mock-key
    depends_on:
      - db
      - cache
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: math-osn-coach-db
    environment:
      - POSTGRES_USER=osn_admin
      - POSTGRES_PASSWORD=osn_secure_pass
      - POSTGRES_DB=mathosn_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osn_admin -d mathosn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: math-osn-coach-cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
